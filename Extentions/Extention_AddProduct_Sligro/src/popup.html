<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>HotelToolkit prijsvergelijker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <div class="logo">
          <span class="logo-mark">HT</span>
          <div>
            <p class="title">HotelToolkit prijsvergelijker</p>
            <p class="subtitle">Vergelijk webshopprijzen met Firebase</p>
          </div>
        </div>
      </header>

      <section id="loginSection" class="card">
        <h2 class="section-title">Inloggen</h2>
        <form id="loginForm" class="auth-form">
          <label class="field">
            <span class="field-label">E-mailadres</span>
            <input
              id="loginEmail"
              type="email"
              class="field-input"
              autocomplete="email"
              required
            />
          </label>
          <label class="field">
            <span class="field-label">Wachtwoord</span>
            <input
              id="loginPassword"
              type="password"
              class="field-input"
              autocomplete="current-password"
              required
            />
          </label>
          <button id="loginBtn" type="submit" class="primary-btn full-width">Inloggen</button>
          <span id="loginError" class="field-helper error hidden"></span>
        </form>
      </section>

      <section id="accountSection" class="card hidden">
        <div class="account-info">
          <div>
            <p class="account-label">Ingelogd als</p>
            <p id="accountEmail" class="account-email"></p>
          </div>
          <button id="logoutBtn" type="button" class="secondary-btn">Uitloggen</button>
        </div>
      </section>

      <section id="controlsSection" class="controls card hidden">
        <label class="field">
          <span class="field-label">Hotel</span>
          <select id="hotelSelect" class="field-input" disabled>
            <option value="" disabled selected>Log in om hotels te laden</option>
          </select>
          <span id="hotelStatus" class="field-helper"></span>
        </label>
        <label class="field">
          <span class="field-label">Webshop</span>
          <select id="webshopSelect" class="field-input">
            <option value="" disabled selected>Maak een keuze</option>
            <option value="sligro">Sligro</option>
            <option value="hanos">HANOS</option>
          </select>
        </label>
        <button id="loadPricesBtn" type="button" class="primary-btn">Load prices</button>
      </section>

      <p id="status" class="status"></p>

      <section id="results" class="results hidden">
        <div class="results-header">
          <span>Webshop</span>
          <span>Firebase</span>
        </div>
        <div id="resultRows" class="results-rows"></div>
      </section>

      <div id="createProductModal" class="modal-overlay hidden">
        <div class="modal-card">
          <h3 class="section-title">Supplierproduct aanmaken</h3>
          <label class="field">
            <span class="field-label">Pricing model</span>
            <select id="pricingModelSelect" class="field-input">
              <option value="Per Purchase Unit">Per Purchase Unit</option>
              <option value="Per Base Unit">Per Base Unit</option>
            </select>
          </label>
          <label class="field">
            <span class="field-label">Prijs</span>
            <input id="pricingValueInput" type="text" class="field-input" placeholder="Bijv. 12,34" />
          </label>
          <div id="baseUnitFields" class="hidden">
            <label class="field">
              <span class="field-label">Purchase Unit *</span>
              <input id="purchaseUnitInput" type="text" class="field-input" placeholder="Bijv. Doos x 72 stuks" />
            </label>
            <label class="field">
              <span class="field-label">Base Unit *</span>
              <input id="baseUnitInput" type="text" class="field-input" placeholder="Bijv. Stuk" />
            </label>
            <label class="field">
              <span class="field-label">Base Units Per Purchase Unit *</span>
              <input id="baseUnitsPerPurchaseUnitInput" type="text" class="field-input" placeholder="Bijv. 72" />
            </label>
          </div>
          <div class="result-actions">
            <button id="createProductCancelBtn" type="button" class="secondary-btn">Annuleren</button>
            <button id="createProductConfirmBtn" type="button" class="primary-btn">Aanmaken</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
